<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cactus-Client</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: url("https://dwarslooper.com/media/background_cactus.png") rgba(0, 0, 0, 0.8);
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            background-blend-mode: overlay;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 720px;
            padding: 32px;

            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 16px;

            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
            font-weight: 700;
        }

        h3 {
            margin: 0 0 24px;
            font-size: 1rem;
            font-weight: normal;
            color: #dddddd;
        }

        a {
            color: #6cff6c;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 16px;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.6rem;
            }

            h3 {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
<div class="container">
    <h1>%response%</h1>

    <h3>%access_notice_text% <a href="https://account.live.com/consent/Manage">%access_notice_link%</a>.</h3>

    <h3>%complete%</h3>

    <div class="video-wrapper">
        <iframe
                src="https://www.youtube.com/embed/dQw4w9WgXcQ?controls=0&autoplay=1"
                title="YouTube video player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
        </iframe>
    </div>
</div>
</body>
</html>
